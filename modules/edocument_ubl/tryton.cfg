[tryton]
version=7.9.0
depends:
    edocument_unece
    ir
    party
extras_depend:
    account_cash_rounding
    account_invoice
    account_payment
    bank
    document_incoming_invoice
    purchase
    sale
xml:
    account.xml
    message.xml

[register]
model:
    party.Party
    party.Identifier

[register account_invoice]
model:
    edocument.Invoice
    account.InvoiceEdocumentStart

[register account_invoice bank]
model:
    edocument.Invoice_Bank

[register account_invoice account_payment]
model:
    edocument.Invoice_Payment

[register account_invoice purchase]
model:
    edocument.Invoice_Purchase

[register document_incoming_invoice]
model:
    document.Incoming
