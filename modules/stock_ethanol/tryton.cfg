[tryton]
version=7.9.0
depends:
    company
    ir
    product
    stock
extras_depend:
    account_stock_eu_excise
    product_measurements
    product_price_list
xml:
    product.xml
    stock.xml
    message.xml

[register]
model:
    product.Template
    product.Product
    stock.Configuration
    stock.ConfigurationEthanol
    stock.Move
    stock.ProductsByLocations

[register account_stock_eu_excise]
model:
    account_stock_eu.ExciseTax
    account_stock_eu.ExciseTaxRate

[register product_price_list]
model:
    product.PriceList
    product.PriceListLine
