[tryton]
version=7.9.0
depends:
    account
    account_product
    company
    country
    currency
    ir
    party
    product
    product_measurements
    stock
extras_depend:
    product_price_list
    production
    sale
    sale_shipment_grouping
    sale_price_list
xml:
    party.xml
    product.xml
    stock.xml
    sale.xml
    account_stock_eu.xml
    message.xml

[register]
model:
    party.Configuration
    party.Address
    party.Identifier
    party.Identifier_EUExciseCode
    product.Template
    product.Product
    product.EUExciseCode
    product.Product_EUExciseTax
    stock.Location
    stock.WarehouseEUExciseNumber
    stock.ShipmentIn
    stock.ShipmentInReturn
    stock.ShipmentOut
    stock.ShipmentOutReturn
    stock.ShipmentInternal
    stock.Move
    account_stock_eu.ExciseTax
    account_stock_eu.ExciseTaxRate
    account_stock_eu.ExciseDeclarationContext
    account_stock_eu.ExciseDeclaration
    account_stock_eu.ExciseDeclarationProduct
    account_stock_eu.ExciseDeclarationProductLine

[register product_price_list]
model:
    product.PriceList
    product.PriceListLine

[register production]
model:
    account_stock_eu.ExciseDeclarationProductLine_Production

[register sale]
model:
    sale.Sale
    sale.Line
