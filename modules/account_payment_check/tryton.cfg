[tryton]
version=7.9.0
depends:
    ir
    account_payment
extras_depend:
    account_statement_rule
xml:
    account.xml
    message.xml

[register]
model:
    account.PaymentJournal
    account.PaymentGroup
    account.Payment
    account.PaymentCheckPrintNumber
wizard:
    account.PaymentCheckPrint
report:
    account.PaymentCheck

[register account_statement_rule]
model:
    account.StatementRule
    account.StatementRuleLine
