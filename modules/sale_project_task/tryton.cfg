[tryton]
version=7.9.0
depends:
    currency
    ir
    product
    project
    sale
extras_depend:
    project_invoice
    project_revenue
xml:
    product.xml
    sale.xml
    project.xml
    message.xml

[register]
model:
    product.Template
    product.Product
    product.ProjectTask
    sale.Configuration
    sale.ConfigurationSaleMethod
    sale.Sale
    sale.Line
    project.Work

[register project_invoice]
model:
    project.Work_Invoice

[register project_revenue]
model:
    sale.Line_Revenue
