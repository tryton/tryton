[tox]
envlist = py310,py311,py312,py313,py314

[testenv]
changedir = {env_site_packages_dir}
extras = test
commands =
    coverage run --rcfile={toxinidir}/tox.ini --source=trytond --omit=*/tests/* -m xmlrunner discover -s trytond.tests {posargs}
    coverage run --rcfile={toxinidir}/tox.ini --source=trytond_gis --omit=*/tests/* -m xmlrunner discover -s trytond_gis.tests {posargs}
commands_post =
    coverage report --rcfile={toxinidir}/tox.ini
    coverage xml --rcfile={toxinidir}/tox.ini -o {package_root}/coverage.xml
deps =
    coverage
    unittest-xml-reporting
passenv = *
setenv =
    TRYTOND_DATABASE_URI={env:POSTGIS_URI:postgis://}
    DB_NAME={env:DB_NAME:test}

[coverage:run]
relative_files = true
