[tox]
envlist = py38,py39,py310,py311,py312,py313

[testenv]
changedir = {toxworkdir}
commands =
    coverage run --source=tryton --omit=*/tests/* -m xmlrunner discover -s tryton.tests {posargs}
commands_post =
    coverage report
    coverage xml
deps =
    coverage
    unittest-xml-reporting
passenv = *
