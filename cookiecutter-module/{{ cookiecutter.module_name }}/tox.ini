[tox]
envlist = {py310,py311,py312,py313}-{sqlite,postgresql}

[testenv]
changedir = {toxworkdir}
extras = test
commands =
{%- if cookiecutter.prefix %}
    coverage run --source={{ cookiecutter.module_name }} --omit=*/tests/* -m xmlrunner discover -s {{ cookiecutter.module_name }} {posargs}
{%- else %}
    coverage run --source=trytond.modules.{{ cookiecutter.module_name }} --omit=*/tests/* -m xmlrunner discover -s trytond.modules.{{ cookiecutter.module_name }} {posargs}
{%- endif %}
commands_post =
    coverage report
    coverage xml
deps =
    coverage
    unittest-xml-reporting
    postgresql: psycopg2 >= 2.7.0
passenv = *
setenv =
    sqlite: TRYTOND_DATABASE_URI={env:SQLITE_URI:sqlite://}
    postgresql: TRYTOND_DATABASE_URI={env:POSTGRESQL_URI:postgresql://}
    sqlite: DB_NAME={env:DB_NAME::memory:}
    postgresql: DB_NAME={env:DB_NAME:test}
